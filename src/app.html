<!doctype html>
<html lang="en" class="dark">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<link
			rel="preload"
			href="%sveltekit.assets%/fonts/BuilderSans/BuilderSans-Regular-400.otf"
			as="font"
			type="font/otf"
			crossorigin="anonymous"
		/>
		<link
			rel="preload"
			href="%sveltekit.assets%/fonts/BuilderSans/BuilderSans-Bold-700.otf"
			as="font"
			type="font/otf"
			crossorigin="anonymous"
		/>
		<style>
			#app-splash {
				position: fixed;
				inset: 0;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				gap: 1rem;
				background: #0b0b0b;
				z-index: 9999;
			}
			#app-splash img {
				width: 64px;
				height: 64px;
			}
			#app-splash p {
				font-family: 'Builder Sans', sans-serif;
				font-weight: 700;
				color: #ffffff;
				margin: 0;
			}
		</style>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div id="app-splash">
			<img
				src="%sveltekit.assets%/download/favicon.svg"
				onerror="this.onerror=null;this.src='%sveltekit.assets%/download/favicon.ico'"
				alt="Logo"
			/>
			<p>Loading locals</p>
		</div>
		<div style="display: contents">%sveltekit.body%</div>
		<script>
			window.addEventListener('DOMContentLoaded', () => {
				document.getElementById('app-splash')?.remove();
			});
		</script>
	</body>
</html>
