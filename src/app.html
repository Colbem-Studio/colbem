<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
		<style>
			@font-face {
				font-family: 'Builder Sans';
				src: url('%sveltekit.assets%/fonts/BuilderSans/BuilderSans-Regular-400.otf') format('opentype');
				font-weight: 400;
				font-display: swap;
			}
			@font-face {
				font-family: 'Builder Sans';
				src: url('%sveltekit.assets%/fonts/BuilderSans/BuilderSans-Bold-700.otf') format('opentype');
				font-weight: 700;
				font-display: swap;
			}
			#app-splash {
				position: fixed;
				inset: 0;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				gap: 1rem;
				background: oklch(0.23 0.004 106);
				z-index: 9999;
				transition: opacity 0.4s ease;
			}
			#app-splash.splash-hidden {
				opacity: 0;
				pointer-events: none;
			}
			#app-splash img {
				width: 64px;
				height: 64px;
			}
			#app-splash p {
				font-family: 'Builder Sans', sans-serif;
				font-weight: 700;
				color: oklch(0.97 0 0);
				margin: 0;
			}
		</style>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div id="app-splash">
			<img
				src="%sveltekit.assets%/download/favicon.svg"
				onerror="this.onerror=null;this.src='%sveltekit.assets%/download/favicon.ico'"
				alt="Logo"
			/>
			<p>Loading Locals</p>
		</div>
		<div style="display: contents">%sveltekit.body%</div>
		<script>
			window.hideAppSplash = () => {
				const el = document.getElementById('app-splash');
				if (!el) return;
				el.classList.add('splash-hidden');
				setTimeout(() => el.remove(), 400);
			};
		</script>
	</body>
</html>
